version: "3.8"

services:

  api:
    build: ./api
    container_name: market_api
    ports:
      - "8000:8000"

  db:
    image: postgres:13
    container_name: market_db
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  etl:
    build: ./etl
    container_name: market_etl
    depends_on:
      - api
      - db